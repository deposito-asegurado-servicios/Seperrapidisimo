<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Rapidísimo - Rastreo</title>
    <style>
        :root {
            --naranja: #ff6600;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 20px;
            border-radius: 40px;
            width: 88%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .header-presentation {
            margin-bottom: 25px;
        }

        .header-presentation .sub {
            font-size: 1.1rem;
            margin: 0;
        }

        .header-presentation .main {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 5px 0;
        }

        .header-presentation .icons {
            font-size: 2.2rem;
            margin-top: 10px;
        }

        input {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            background-color: #f2f2f2;
            box-sizing: border-box;
            font-size: 1rem;
            margin-bottom: 12px;
            outline: none;
            color: #333;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-bottom: 12px;
            transition: transform 0.2s;
            display: block;
            text-decoration: none;
            text-align: center;
            text-transform: uppercase;
        }

        .btn:active { transform: scale(0.97); }

        .btn-orange { background-color: var(--naranja); color: white; }
        .btn-dark { background: linear-gradient(90deg, #333, #444); color: white; border: 1px solid #555; }

        .footer { color: #777; font-size: 0.85rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-presentation">
        <p class="sub">🚛 Servicio de entrega ✈️</p>
        <p class="main">Consulta guía</p>
        <div class="icons">🔐📦🔐</div>
    </div>

    <input type="text" id="numGuia" placeholder="Ingresa número de guía">
    <input type="text" id="destino" placeholder="Ingresa la dirección de destino">

    <button class="btn btn-orange" onclick="procesarRastreo()">Rastrear Envío</button>

    <button class="btn btn-dark" onclick="alert('Iniciando Chat Bot...')">Chat Bot</button>

    <a href="https://www.facebook.com/share/1BEPK7YTMN/" target="_blank" class="btn btn-dark">Conoce más sobre nosotros</a>

    <div class="footer">Servicio exclusivo depósito asegurado</div>
</div>

<script>
    function procesarRastreo() {
        const guia = document.getElementById('numGuia').value.trim();
        const destino = document.getElementById('destino').value.trim() || "No especificada";
        const codigoValido = "0750925931";
        const telefono = "573012423788";

        // Genera automáticamente la fecha y hora exacta del dispositivo del usuario
        const ahora = new Date();
        const opciones = { 
            year: 'numeric', 
            month: 'numeric', 
            day: 'numeric', 
            hour: 'numeric', 
            minute: '2-digit', 
            second: '2-digit', 
            hour12: true 
        };
        const fechaHoraActual = ahora.toLocaleString('es-CO', opciones);

        if (guia === codigoValido) {
            const texto = `Hola, solicito más información del envío:\n\n📦 Guía: ${codigoValido}\n📍 Estado: En tránsito\n🏢 Ubicación: Centro logístico\n🎯 Dirección de destino: ${destino}\n🕒 Última actualización: ${fechaHoraActual}\n\nQuedo atento a la información.`;
            window.location.href = `https://wa.me/${telefono}?text=${encodeURIComponent(texto)}`;
        } else if (guia === "") {
            alert("Por favor, ingresa el número de guía.");
        } else {
            alert("Guía no encontrada. Por favor, verifica el número.");
        }
    }
</script>
</body>
</html>
